{% extends 'base.html' %}

{% block title %}Account{% endblock %}

{% block content %}
    <div>
        <h1>Аккаунт {{ login }}</h1>
    </div>
    <div>
        <form action="{{ url_for('logout') }}" method="get">
            <button type="submit">Выйти</button>
        </form>
        {% if error %}
            <p style="color: red">{{ error }}</p>
        {% endif %}
        <form method="post">
            <input type="text" name="login" placeholder="Логин" value="{{ login }}" readonly>
            <input type="text" name="name" placeholder="Имя">
            <input type="text" name="surname" placeholder="Фамилия">
            <input type="email" name="email" placeholder="Почта">
            <select name="role">
                {% for element in roleList %}
                <option value="{{ element.id }}">{{ element.role_name }}</option>
                {% endfor %}
            </select>
            <input type="date" name="datebirth" placeholder="Дата рождения">
            <button type="submit">Заполнить</button>
        </form>
    </div>
{% endblock %}
