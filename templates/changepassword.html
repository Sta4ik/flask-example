{% extends 'base.html' %}

{% block title %}Change{% endblock %}

{% block content %}
    <div>
        <h1>Смена пароля</h1>
    </div>
    {% if error %}
        <p style="color: red">{{ error }}</p>
    {% endif %}
    <div>
        <form method="post">
            <input type="password" name="oldpassword">
            <input type="password" name="newpassword">
            <button type="submit">Сменить</button>
        </form>
    </div>
{% endblock %}
